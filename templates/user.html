<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/3.5.0/remixicon.css">
    <title>User Settings</title>
    <style>
      body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f4f4f4;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      }
      .container {
      max-width: 700px;
      width: 100%;
      background: #fff;
      padding: 2rem;
      border-radius: 8px;
      box-shadow: 0 6px 8px rgba(0, 0, 0, 0.1);
      margin: 0 1rem;
      }
      h1 {
      text-align: center;
      margin-bottom: 1.5rem;
      color: #333;
      font-size: 2rem;
      }
      .form-group {
      margin-bottom: 1.5rem;
      }
      .form-group label {
      display: block;
      font-weight: bold;
      margin-bottom: 0.5rem;
      color: #555;
      }
      .form-group input,
      .form-group select {
      width: 95%;
      padding: 0.8rem;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 1rem;
      margin-top: 0.5rem;
      }
      .form-actions {
      display: flex;
      justify-content: center;
      gap: 1.5rem;
      }
      .form-actions button {
      padding: 0.8rem 2rem;
      border: none;
      border-radius: 4px;
      font-size: 1rem;
      cursor: pointer;
      color: #fff;
      transition: background-color 0.3s ease;
      }
      .save-btn {
      background-color: #4CAF50;
      }
      .save-btn:hover {
      background-color: #45a049;
      }
      .cancel-btn {
      background-color: #f44336;
      }
      .cancel-btn:hover {
      background-color: #da190b;
      }
      .flash-message {
      padding: 1rem;
      margin-bottom: 1rem;
      border-radius: 4px;
      font-weight: bold;
      color: #fff;
      }
      .flash-success {
      background-color: #4CAF50;
      }
      .flash-danger {
      background-color: #f44336;
      }
      @media (max-width: 768px) {
      .container {
      padding: 1rem;
      }
      .form-actions button {
      padding: 0.8rem 1.5rem;
      }
      /* Estilo para simular um campo desabilitado */
      .disabled-input {
      background-color: #f0f0f0; /* Cor de fundo cinza */
      color: #aaa; /* Texto cinza */
      pointer-events: none; /* Impede a interação do usuário */
      }
      }
    </style>
    <script>
      function validatePhoneInput(event) {
         // Permitir apenas números e garantir que o campo tenha 9 números
         const input = event.target;
         let value = input.value.replace(/\D/g, '');
         if (value.length > 9) {
            value = value.slice(0, 9); // Limitar a 9 números
         }
         input.value = value;
      }
    </script>
  </head>
  <body>
    <div class="container">
      <h1>User Settings</h1>
      <!-- Exibir mensagens de sucesso ou erro -->
      {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
      <div class="flash-message {{ messages[0][0] == 'success' and 'flash-success' or 'flash-danger' }}">
        {{ messages[0][1] }}
      </div>
      {% endif %}
      {% endwith %}
      <!-- Formulário para alterar as informações do usuário -->
      <form method="POST">
        <!-- Nome -->
        <div class="form-group">
          <label for="name">Name</label>
          <input type="text" id="name" name="name" value="{{ user['name'] }}" required>
        </div>
        <!-- Email (Apenas visualizado, não editável) -->
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" value="{{ user['email'] }}" disabled>
        </div>
        <!-- Telefone -->
        <div class="form-group">
          <label for="phone">Phone (optional)</label>
          <input type="text" id="phone" name="phone" value="{{ user['phone'] }}" 
            oninput="validatePhoneInput(event)" maxlength="9">
        </div>
        <!-- Ações -->
        <div class="form-actions">
          <button type="submit" class="save-btn">Save Changes</button>
          <button type="button" class="cancel-btn" onclick="window.location.href='/home'">Cancel</button>
        </div>
      </form>
    </div>
  </body>
</html>
